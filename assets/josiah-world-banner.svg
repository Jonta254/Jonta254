    <text x="22" y="24" fill="#BAE6FD" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="1">JONTAWORLD</text>

    <text x="0" y="108" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="60" font-weight="800">I'm Josiah</text>
    <text x="0" y="158" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="500">World Network developer, Pi Network builder, and full-stack learner.</text>
    <text x="0" y="205" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="19">Building practical tools around identity, payments, community, and useful web apps.</text>

    <g transform="translate(0 248)">
      <rect width="166" height="42" rx="21" fill="#14B8A6" fill-opacity="0.18" stroke="#5EEAD4" stroke-opacity="0.42"/>
