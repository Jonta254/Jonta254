      <rect x="184" width="132" height="42" rx="21" fill="#FACC15" fill-opacity="0.15" stroke="#FDE68A" stroke-opacity="0.40"/>
      <text x="209" y="27" fill="#FEF3C7" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Pi Network</text>
